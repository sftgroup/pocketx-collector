<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PocketX Admin — Login</title>
<style>
:root {
  --bg: #0a0a0f;
  --card: #111118;
  --border: #1e1e2e;
  --text: #cdd6f4;
  --dim: #585b70;
  --accent: #89b4fa;
  --green: #a6e3a1;
  --red: #f38ba8;
  --yellow: #f9e2af;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
}
.login-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px;
  width: 380px;
  max-width: 92vw;
}
.login-card .logo {
  text-align: center;
  margin-bottom: 32px;
}
.login-card .logo h1 {
  font-size: 22px;
  font-weight: 700;
}
.login-card .logo p {
  font-size: 13px;
  color: var(--dim);
  margin-top: 6px;
}
.field {
  margin-bottom: 20px;
}
.field label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}
.field input {
  width: 100%;
  padding: 12px 14px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 15px;
  outline: none;
  transition: border-color .2s;
}
.field input:focus {
  border-color: var(--accent);
}
.btn {
  width: 100%;
  padding: 13px;
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .2s;
}
.btn:hover { opacity: .9; }
.btn:disabled { opacity: .5; cursor: not-allowed; }
.error {
  color: var(--red);
  font-size: 13px;
  text-align: center;
  margin-top: 12px;
  min-height: 20px;
}
.status {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-top: 24px;
  font-size: 12px;
  color: var(--dim);
}
.status .dot {
  width: 6px; height: 6px; border-radius: 50%;
}
.status .dot.online { background: var(--green); }
.status .dot.offline { background: var(--red); }
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <h1>🔐 PocketX Admin</h1>
    <p>Data Collector Management</p>
  </div>
  <form id="loginForm">
    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="admin" autocomplete="username" autofocus>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="········" autocomplete="current-password">
    </div>
    <button type="submit" class="btn" id="submitBtn">Sign In</button>
    <div class="error" id="error"></div>
  </form>
  <div class="status">
    <span class="dot online"></span> Collector v2.0
  </div>
</div>

<script>
const form = document.getElementById('loginForm');
const error = document.getElementById('error');
const btn = document.getElementById('submitBtn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  if (!username || !password) {
    error.textContent = 'Please enter username and password';
    return;
  }
  btn.disabled = true;
  btn.textContent = 'Signing in…';
  error.textContent = '';
  try {
    const resp = await fetch('/api/v2/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await resp.json();
    if (resp.ok && data.code === 0) {
      window.location.href = data.data.redirect || '/admin';
    } else {
      error.textContent = data.message || 'Invalid credentials';
    }
  } catch {
    error.textContent = 'Network error. Is the collector running?';
  }
  btn.disabled = false;
  btn.textContent = 'Sign In';
});
</script>
</body>
</html>
